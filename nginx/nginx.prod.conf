user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 10m;

    # Gzip 压缩
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        application/javascript
        application/json
        application/xml
        text/css
        text/plain
        text/xml
        image/svg+xml;

    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    # ==========================================================================
    # ⚠️  V1.0 整改 Batch 2 — B2-5：公网部署必须启用 HTTPS  ⚠️
    # ==========================================================================
    # 默认配置仅适用于「内网/家用 NAS」部署。**任何公网可达部署必须启用 HTTPS**：
    #   - 不启用 → JWT 在公网明文传输 → 中间人可窃取登录 token → 账户被劫持
    #   - 启用方法见 docs/guides/deployment.md §2「公网部署 HTTPS 强制要求」小节
    # 启用后请：① 取消下方 HTTP→HTTPS 重定向 server 块的注释；② 注释 server 块的
    # `listen 80 default_server;`；③ 取消 `listen 443 ssl http2;` 与 ssl_* 行注释。
    # ==========================================================================

    # HTTP → HTTPS 重定向（生产启用 SSL 时打开）
    # server {
    #     listen 80;
    #     server_name your-domain.com;
    #     return 301 https://$server_name$request_uri;
    # }

    server {
        listen 80 default_server;
        # listen 443 ssl http2;              # 启用 HTTPS 时打开
        # ssl_certificate /etc/nginx/ssl/fullchain.pem;
        # ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        # ssl_protocols TLSv1.2 TLSv1.3;

        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # SPA 路由回退
        location / {
            try_files $uri $uri/ /index.html;
        }

        # 静态资源长期缓存
        location ~* \.(js|css|png|jpg|gif|ico|svg|woff2?)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # REST API 反代
        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 90s;
            proxy_connect_timeout 10s;
        }

        # WebSocket 升级（Phase 8 回测进度；Phase 10 预留 /ws/pipeline/progress）
        location ~ ^/(ws|api/v1/.+/progress) {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
        }

        # 健康检查直通
        location = /health {
            proxy_pass http://backend/health;
            access_log off;
        }
    }
}
