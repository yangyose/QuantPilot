server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA 路由：未找到文件时回退到 index.html（Vue Router history 模式）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # R13-P1-4：WebSocket 端点必须在通用 /api/ 之前匹配 + 加 Upgrade header；
    # 否则单独跑 frontend 容器时 PipelineProgressCard 拿不到流水线进度。
    # 与 nginx/nginx.prod.conf:109-117 对齐。
    location ~ ^/(ws|api/v1/.+/progress) {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
    }

    # API 反向代理到后端
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
